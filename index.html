<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HUANGX - Imperial Spin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header dengan logo dan saldo -->
    <div class="header">
        <img src="assets/huangx-logo.svg" alt="HUANGX" class="logo">
        <div class="balance-container">
            <span class="balance-label">👑 Koin</span>
            <span class="balance-value" id="coinBalance">0</span>
        </div>
    </div>

    <!-- Area Slot Machine -->
    <div class="slot-machine">
        <div class="reels" id="reels">
            <div class="reel" id="reel1">🎰</div>
            <div class="reel" id="reel2">🎰</div>
            <div class="reel" id="reel3">🎰</div>
        </div>
        <button class="spin-btn" id="spinBtn">🎲 SPIN IMPERIAL 🎲</button>
    </div>

    <!-- Tombol Aksi -->
    <div class="action-buttons">
        <button class="action-btn" id="collectBtn">🏦 Kumpulkan Koin</button>
        <button class="action-btn" id="shopBtn">🛒 Toko Booster</button>
        <button class="action-btn" id="walletBtn">💎 Connect Wallet</button>
    </div>

    <!-- Status & Info -->
    <div class="info-panel" id="infoPanel">
        <p>✨ Spin gratis setiap 10 menit ✨</p>
        <p id="nextSpinTimer"></p>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="config.js"></script>
    <script src="game.js"></script>
    <script src="app.js"></script>
</body>
</html>
