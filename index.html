<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huangx Airdrop Game</title>
    <style>
        body { background: #000; color: #ffd700; text-align: center; font-family: Arial; }
        #coin { width: 200px; cursor: pointer; transition: transform 0.1s; }
        #coin:active { transform: scale(0.9); }
        .stats { font-size: 24px; margin-top: 20px; }
        .btn-task { background: #ffd700; color: #000; padding: 10px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>HUANGX COIN HUNTER</h1>
    <div class="stats">Coins: <span id="balance">0</span></div>
    
    <img src="https://cdn-icons-png.flaticon.com/512/217/217853.png" id="coin" alt="Click Me">

    <div style="margin-top: 30px;">
        <h3>Daily Missions</h3>
        <button class="btn-task" onclick="doTask()">Join Telegram (+1000 Coins)</button>
    </div>

    <script>
        let balance = localStorage.getItem('coins') || 0;
        document.getElementById('balance').innerText = balance;

        // Fungsi Tap
        document.getElementById('coin').onclick = () => {
            balance++;
            updateUI();
        };

        // Fungsi Task
        function doTask() {
            balance = parseInt(balance) + 1000;
            updateUI();
            alert("Task Completed! +1000 Huangx Coins");
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
            localStorage.setItem('coins', balance); // Simpan di browser user
        }
    </script>
</body>
</html>
