<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇 HUANGX - Elite Mining</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        /* TEMA LUXURY GOLD & BLACK */
        body { 
            background: radial-gradient(circle, #222 0%, #000 100%); 
            color: #ffd700; /* Warna Emas Utama */
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            user-select: none;
            overflow-x: hidden;
        }

        .container { padding: 20px; max-width: 480px; margin: auto; }

        /* HEADER SULTAN */
        .header { 
            padding: 15px; 
            border-bottom: 2px solid #ffd700; /* Garis Emas Bawah */
            background: rgba(255, 215, 0, 0.03);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
        }
        h2 { letter-spacing: 5px; color: #fff; font-weight: 800; margin: 0; text-shadow: 0 0 10px #ffd700; }

        /* STATS BOARD MEWAH */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }
        .stat-card {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(0,0,0,0));
            border: 2px solid #ffd700; /* Frame Emas Tebal */
            padding: 18px;
            border-radius: 20px;
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.2), 0 5px 15px rgba(0,0,0,0.5);
        }
        .label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .value { display: block; font-size: 26px; font-weight: 800; color: #fff; text-shadow: 0 0 5px #ffd700; }

        /* LOGO UTAMA ORCA EMAS (PERBAIKAN TOTAL) */
        #coin-container { 
            position: relative; 
            margin: 40px auto; 
            width: 250px; 
            height: 250px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.03);
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            display: flex; justify-content: center; align-items: center;
        }
        #coin-image { 
            width: 90%; 
            border-radius: 50%;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
            cursor: pointer; 
            transition: transform 0.05s ease, filter 0.1s ease;
        }
        #coin-image:active { transform: scale(0.90); filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4));}

        /* ENERGY SYSTEM EMAS */
        .energy-bar {
            width: 100%; height: 14px;
            background: #111;
            border-radius: 10px;
            border: 1px solid #ffd700;
            margin-top: 15px;
            overflow: hidden;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.1);
        }
        #energy-fill {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b); /* Gradient Emas Kilau */
            transition: width 0.3s ease;
        }

        /* BUTTONS SHOP SULTAN */
        .shop-container { margin-top: 35px; }
        .btn {
            background: linear-gradient(45deg, #ffd700, #b8860b, #ffd700); /* Gradient Emas Tombol */
            color: #000;
            border: none;
            padding: 18px;
            width: 100%;
            font-weight: 800;
            border-radius: 15px;
            cursor: pointer;
            margin-bottom: 12px;
            font-size: 17px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .btn-solana { 
            background: #000; color: #ffd700; 
            border: 2px solid #ffd700; 
            box-shadow: inset 0 0 10px rgba(255, 215, 0, 0.1);
        }

        /* LEADERBOARD MEWAH */
        .ranking {
            background: #111;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #333;
            margin-top: 35px;
            text-align: left;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .rank-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
        .rank-row:last-child { border-bottom: none; }
        .gold { color: #ffd700; font-weight: 800; text-shadow: 0 0 5px #ffd700; }
        .user-rank { color: #fff; opacity: 0.6; }

        .address-box { font-size: 11px; color: #555; margin-top: 25px; word-break: break-all; border-top: 1px solid #222; padding-top: 10px;}
    </style>
</head>

<script>
    // INITIAL DATA
    let balance = parseInt(localStorage.getItem('huangx_balance')) || 0;
    let tapPower = parseInt(localStorage.getItem('huangx_power')) || 1;
    let energy = 1000;
    const maxEnergy = 1000;

    // UPDATE TAMPILAN AWAL
    updateDisplay();

    // LOGIKA KLIK (TAP)
    document.getElementById('coin-image').onclick = function() {
        if (energy > 0) {
            balance += tapPower;
            energy -= 1;
            updateDisplay();
            saveData();
        } else {
            alert("Energy habis! Tunggu recharge dulu bro.");
        }
    };

    // RECHARGE ENERGY (DAPET 3 ENERGY TIAP 2 DETIK)
    setInterval(() => {
        if (energy < maxEnergy) {
            energy += 3;
            if (energy > maxEnergy) energy = maxEnergy;
            updateDisplay();
        }
    }, 2000);

    function updateDisplay() {
        document.getElementById('balance').innerText = balance.toLocaleString();
        document.getElementById('tapPower').innerText = tapPower;
        document.getElementById('energy-text').innerText = energy;
        
        // Update Bar Energy
        let percentage = (energy / maxEnergy) * 100;
        document.getElementById('energy-fill').style.width = percentage + "%";
    }

    function saveData() {
        localStorage.setItem('huangx_balance', balance);
        localStorage.setItem('huangx_power', tapPower);
    }

    // FUNGSI PEMBAYARAN (SIMULASI)
    function buyStars() {
        alert("Konfirmasi pembayaran 1000 Stars ke Huangx Admin...");
    }

    function buySolana() {

        prompt("Kirim 0.1 SOL ke address ini untuk aktivasi Auto-Bot:", ca);
    }
